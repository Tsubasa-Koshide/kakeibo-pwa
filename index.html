<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふたりの家計簿</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1A1A1A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ふたりの家計簿">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#EEECEA;min-height:100vh;display:block;padding:0}
:root{
  --bg:#EEECEA;
  --ink:#1A1A1A;
  --ink2:rgba(26,26,26,.5);
  --ink3:rgba(26,26,26,.28);
  --lime:#e2dc54;
  --forest:#266433;
  --mint:#dfefca;
  --blue:#032f98;
  --tang:#f45c27;
  --sky:#add0ee;
  --berry:#6d2d59;
  --lav:#d1c4e9;
}
#phone{width:100%;background:var(--bg);border-radius:0;padding:0;box-shadow:none}
#inner{border-radius:0;overflow:hidden;background:var(--bg);height:100dvh;width:100%;max-width:430px;margin:0 auto;display:flex;flex-direction:column;position:relative}
.sb{display:none}
/* ── Header ── */
.hd{padding:8px 20px 12px;flex-shrink:0}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.avs{display:flex;align-items:center}
.av{width:38px;height:38px;border-radius:50%;border:3px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.av-a{background:var(--lime);color:var(--ink);margin-right:-10px;z-index:2}
.av-b{background:var(--sky);color:var(--ink)}
.period{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;color:var(--ink2);background:rgba(26,26,26,.07);padding:6px 12px;border-radius:20px;border:none;font-family:inherit;cursor:pointer}
.htitle{font-size:42px;font-weight:500;color:var(--ink);letter-spacing:-2px;line-height:1;margin:0 0 6px}
.hsub{font-size:12px;color:var(--ink2);font-weight:400;display:flex;gap:16px}
.hsub b{color:var(--ink);font-weight:600}
.body{flex:1;overflow-y:auto;padding:0 14px 8px;-webkit-overflow-scrolling:touch}
.body::-webkit-scrollbar{display:none}

/* ── Nav ── */
nav{display:flex;align-items:flex-start;background:var(--bg);border-top:.5px solid rgba(26,26,26,.08);flex-shrink:0;padding:6px 0 22px;position:relative}
.tab-btn{flex:1;padding:8px 0;background:none;border:none;cursor:pointer;font-size:10px;font-weight:500;color:var(--ink3);display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;transition:color .15s;line-height:1}
.tab-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab-btn.on{color:var(--ink)}
.nav-center{flex:1;display:flex;align-items:flex-start;justify-content:center}
.plus-btn{width:52px;height:52px;background:var(--ink);color:#fff;border:none;border-radius:50%;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.3);margin-top:-18px;font-weight:300;line-height:1;padding-bottom:2px;transition:transform .15s;font-family:inherit}
.plus-btn:active{transform:scale(.92)}

/* ── Modal ── */
#backdrop{position:absolute;inset:0;background:rgba(26,26,26,.5);z-index:9;opacity:0;pointer-events:none;transition:opacity .25s;border-radius:38px}
#backdrop.open{opacity:1;pointer-events:all}
#modal{position:absolute;bottom:0;left:0;right:0;background:var(--bg);border-radius:24px 24px 0 0;z-index:10;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);overflow-y:auto;padding:0 0 40px}
#modal.open{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:rgba(26,26,26,.12);border-radius:2px;margin:12px auto 16px}
.modal-inner{padding:0 16px}
.modal-title{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:16px}

/* ── Form ── */
.ttog{display:flex;background:rgba(26,26,26,.07);border-radius:13px;padding:3px;gap:3px;margin-bottom:12px}
.ttog button{flex:1;padding:9px;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;background:none;color:var(--ink2);font-family:inherit;transition:all .15s}
.ttog button.se{background:var(--ink);color:#fff}
.ttog button.si{background:var(--tang);color:#fff}
.ptog{display:flex;gap:8px;margin-bottom:12px}
.ptog button{flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1.5px solid transparent;background:rgba(26,26,26,.05);color:var(--ink2);transition:all .15s}
.ptog button.pa{border-color:var(--lime);background:var(--lime);color:var(--ink)}
.ptog button.pb{border-color:var(--sky);background:var(--sky);color:var(--ink)}
.irow{margin-bottom:10px}
.irow label{font-size:10px;color:var(--ink2);display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.irow input,.irow select{width:100%;padding:10px 13px;border:none;border-radius:11px;font-size:14px;font-weight:400;background:rgba(26,26,26,.06);color:var(--ink);font-family:inherit;outline:none;-webkit-appearance:none;appearance:none}
.irow input:focus{background:rgba(26,26,26,.1)}
.abtn{width:100%;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.abtn:active{opacity:.8}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.cat-add-row{display:flex;gap:6px;margin-top:6px}
.cat-add-row input{flex:1;padding:8px 12px;border:none;border-radius:10px;font-size:13px;background:rgba(26,26,26,.06);color:var(--ink);font-family:inherit;outline:none}
.cat-add-row button{padding:8px 14px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}

/* ── Calendar ── */
.cal-wrap{background:rgba(255,255,255,.6);border-radius:20px;padding:14px;margin-bottom:12px}
.cal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-month{font-size:14px;font-weight:600;color:var(--ink)}
.cal-total{font-size:13px;font-weight:500;color:var(--ink2)}
.cal-heads{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-heads span{text-align:center;font-size:10px;font-weight:500;color:var(--ink2);padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{display:flex;flex-direction:column;align-items:center;padding:4px 2px;border-radius:10px;cursor:pointer;min-height:44px;transition:background .15s}
.cal-cell.empty{cursor:default}
.cal-cell:not(.empty):hover{background:rgba(26,26,26,.05)}
.cal-cell.sel{background:rgba(26,26,26,.07)}
.cal-num{font-size:11px;font-weight:500;color:var(--ink);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.today .cal-num{background:var(--ink);color:#fff}
.cal-cell.sat .cal-num{color:var(--blue)}
.cal-cell.sun .cal-num{color:var(--tang)}
.cal-amt{font-size:8.5px;font-weight:500;color:var(--ink2);margin-top:1px;text-align:center}
.day-header{font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin:4px 0 8px;padding:0 2px}

/* ── Memo cards (image-1 style) ── */
.memo-cards-section{margin-bottom:12px}
.section-label{font-size:10px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:0 2px}
.memo-cards-scroll{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 10px;-webkit-overflow-scrolling:touch}
.memo-cards-scroll::-webkit-scrollbar{display:none}
.memo-card{min-width:148px;height:124px;border-radius:20px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;flex-shrink:0;cursor:pointer;transition:transform .12s}
.memo-card:active{transform:scale(.96)}
.memo-card.done-card{opacity:.42}
.mc-text{font-size:13px;font-weight:600;line-height:1.38;flex:1;word-break:break-word}
.mc-text.struck{text-decoration:line-through}
.mc-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.mc-chip{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:500}
.mc-action{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

/* ── Entry cards ── */
.xcard{border-radius:22px;padding:16px 18px;margin-bottom:9px}
.xcard .xtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px}
.xcard .xav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:rgba(255,255,255,.3)}
.xcard .xday{font-size:11px;font-weight:400;opacity:.5}
.xcard .xcat{font-size:10px;font-weight:500;opacity:.5;letter-spacing:.4px;margin-bottom:5px;text-transform:uppercase}
.xcard .xrow{display:flex;justify-content:space-between;align-items:flex-end;gap:8px}
.xcard .xname{font-size:18px;font-weight:500;letter-spacing:-.2px;line-height:1.2;flex:1}
.xcard .xamt{font-size:17px;font-weight:600;letter-spacing:-.2px;flex-shrink:0}
.xcard.dk .xday,.xcard.dk .xcat,.xcard.dk .xname,.xcard.dk .xamt,.xcard.dk .xav{color:#fff}
.ftag{display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:500;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.22);margin-bottom:7px;letter-spacing:.4px;text-transform:uppercase}

/* ── Settle ── */
.shero{background:var(--ink);border-radius:22px;padding:20px 22px;color:#fff;margin-bottom:10px}
.shero .sl{font-size:10px;font-weight:500;opacity:.4;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.shero .sa{font-size:36px;font-weight:500;letter-spacing:-1.5px;margin-bottom:5px}
.shero .sd{font-size:13px;font-weight:400;opacity:.6}
.pcards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.pcard{border-radius:18px;padding:13px}
.pcard-a{background:var(--lime)}.pcard-b{background:var(--sky)}
.pcard .pn{font-size:10px;font-weight:500;color:var(--ink2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.pcard .pv{font-size:19px;font-weight:500;color:var(--ink);letter-spacing:-.5px}
.pcard .pp{font-size:11px;font-weight:400;color:var(--ink2);margin-top:3px}

/* ── Compare card ── */
.compare-card{background:rgba(255,255,255,.6);border-radius:20px;padding:15px;margin-bottom:10px}
.compare-card h3{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ink2);margin-bottom:12px}
.compare-hero{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.ch-amt{font-size:24px;font-weight:600;color:var(--ink);letter-spacing:-1px}
.ch-delta{font-size:13px;font-weight:600;padding:4px 10px;border-radius:20px}
.ch-delta.up{background:rgba(244,92,39,.12);color:var(--tang)}
.ch-delta.dn{background:rgba(38,100,51,.12);color:var(--forest)}
.ch-delta.flat{background:rgba(26,26,26,.07);color:var(--ink2)}
.compare-sub{font-size:11px;font-weight:400;color:var(--ink2);margin-bottom:14px}
.cat-compare-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.cc-name{font-size:12px;font-weight:500;color:var(--ink);width:54px;flex-shrink:0}
.cc-bar-wrap{flex:1;position:relative;height:20px;display:flex;align-items:center}
.cc-bar-bg{position:absolute;left:0;top:7px;right:0;height:6px;background:rgba(26,26,26,.07);border-radius:3px;overflow:hidden}
.cc-bar-fill{height:100%;border-radius:3px}
.cc-arrow{font-size:13px;font-weight:700;width:20px;flex-shrink:0;text-align:center}
.cc-arrow.up{color:var(--tang)}.cc-arrow.dn{color:var(--forest)}.cc-arrow.flat{color:var(--ink3)}
.cc-val{font-size:11px;font-weight:500;color:var(--ink2);min-width:50px;text-align:right;flex-shrink:0}

.ccard{background:rgba(255,255,255,.6);border-radius:18px;padding:14px;margin-bottom:10px}
.ccard h3{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ink2);margin-bottom:11px}
.crow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cn{font-size:13px;font-weight:500;color:var(--ink);flex:1}
.cbar-w{width:66px;height:5px;background:rgba(26,26,26,.08);border-radius:3px;overflow:hidden}
.cbar{height:100%;border-radius:3px}
.camt{font-size:12px;font-weight:600;color:var(--ink);min-width:56px;text-align:right}

/* ── Memo tab ── */
.memo-add{background:rgba(255,255,255,.6);border-radius:20px;padding:12px;margin-bottom:10px;display:flex;gap:8px;align-items:flex-end}
.memo-add textarea{flex:1;border:none;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:400;font-family:inherit;background:rgba(26,26,26,.06);color:var(--ink);resize:none;outline:none;height:42px;line-height:1.4}
.send-btn{width:42px;height:42px;background:var(--ink);color:#fff;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.memo-who-row{display:flex;gap:6px;margin-bottom:10px}
.memo-who-row button{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.memo-who-row button.pa{background:var(--lime);color:var(--ink)}
.memo-who-row button.pb{background:var(--sky);color:var(--ink)}
.memo-who-row button.off{background:rgba(26,26,26,.07);color:var(--ink2)}
.memo-list-item{background:rgba(255,255,255,.6);border-radius:16px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;transition:opacity .2s}
.memo-list-item.done{opacity:.42}
.memo-cb{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(26,26,26,.15);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:none;margin-top:1px;transition:all .15s}
.memo-cb.ch{background:var(--ink);border-color:var(--ink)}
.memo-cb svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.memo-body{flex:1;min-width:0}
.memo-body .mt{font-size:13px;font-weight:400;color:var(--ink);line-height:1.4}
.memo-list-item.done .mt{text-decoration:line-through;color:var(--ink2)}
.memo-body .mm{font-size:10px;font-weight:400;color:var(--ink3);margin-top:3px;display:flex;align-items:center;gap:4px}
.memo-del{background:none;border:none;cursor:pointer;color:var(--ink3);display:flex;align-items:center;flex-shrink:0}
.memo-del svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.msect{font-size:10px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 7px;padding:0 2px}

/* ── Fixed tab ── */
.fxcard{border-radius:20px;padding:13px 16px;margin-bottom:9px;display:flex;align-items:center;gap:10px;transition:opacity .2s}
.fxcard.off{opacity:.4}
.fxicon{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.fxmeta{flex:1;min-width:0}
.fxmeta .fn{font-size:13px;font-weight:600;letter-spacing:-.2px}
.fxmeta .fd{font-size:11px;font-weight:400;opacity:.55;margin-top:2px}
.fxright{text-align:right;flex-shrink:0}
.fxamt{font-size:14px;font-weight:600}
.fxact{display:flex;gap:5px;justify-content:flex-end;align-items:center;margin-top:5px}
.tsw{width:38px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tsw::after{content:'';width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.tsw.on{background:var(--ink)}.tsw.on::after{left:19px}
.tsw.off{background:rgba(26,26,26,.2)}.tsw.off::after{left:3px}
.dbtn{background:rgba(26,26,26,.1);border:none;border-radius:7px;padding:4px 9px;cursor:pointer;font-size:11px;font-weight:500;font-family:inherit;display:flex;align-items:center;gap:2px;color:inherit}
.istrip{background:rgba(255,255,255,.55);border-radius:14px;padding:11px 14px;margin-bottom:10px;font-size:12px;font-weight:400;color:var(--ink2);display:flex;align-items:center;gap:8px;line-height:1.5}
.fbox{background:rgba(255,255,255,.6);border-radius:20px;padding:15px;margin-top:4px}
.fbox .ftitle{font-size:10px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

/* ── Onboarding ── */
#onboarding{position:absolute;inset:0;background:var(--bg);z-index:20;border-radius:38px;display:flex;flex-direction:column;overflow:hidden}
.ob-header{padding:56px 24px 0;flex-shrink:0}
.ob-step{display:flex;gap:6px;margin-bottom:20px}
.ob-dot{width:6px;height:6px;border-radius:50%;background:rgba(26,26,26,.15);transition:all .3s}
.ob-dot.on{width:20px;background:var(--ink)}
.ob-body{flex:1;padding:0 24px;overflow-y:auto}
.ob-body::-webkit-scrollbar{display:none}
.ob-title{font-size:26px;font-weight:600;color:var(--ink);letter-spacing:-.8px;line-height:1.2;margin-bottom:8px}
.ob-sub{font-size:13px;font-weight:400;color:var(--ink2);line-height:1.6;margin-bottom:28px}
.ob-input{width:100%;padding:14px 16px;border:none;border-radius:16px;font-size:16px;font-weight:500;background:rgba(26,26,26,.06);color:var(--ink);font-family:inherit;outline:none;margin-bottom:12px}
.ob-input:focus{background:rgba(26,26,26,.1)}
.ob-btn{width:100%;padding:15px;background:var(--ink);color:#fff;border:none;border-radius:16px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:opacity .15s}
.ob-btn:active{opacity:.8}
.ob-btn-sub{width:100%;padding:12px;background:none;border:none;font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;font-family:inherit;margin-top:4px}
.ob-card{border-radius:20px;padding:18px;margin-bottom:12px;position:relative}
.ob-code{font-size:28px;font-weight:700;letter-spacing:6px;color:var(--ink);text-align:center;margin:16px 0;font-variant-numeric:tabular-nums}
.ob-share-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:1.5px solid rgba(26,26,26,.15);border-radius:14px;background:none;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit;margin-bottom:8px}
.ob-tab-row{display:flex;background:rgba(26,26,26,.06);border-radius:12px;padding:3px;gap:3px;margin-bottom:20px}
.ob-tab{flex:1;padding:8px;border:none;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;background:none;color:var(--ink2);font-family:inherit;transition:all .15s}
.ob-tab.on{background:var(--ink);color:#fff}
.ob-avatar-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(26,26,26,.05);border-radius:14px;margin-bottom:10px}
.ob-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
</style>
</head>
<body>
<div id="phone">
  <div id="inner">
    <div class="sb">
      <span>9:41</span>
      <span style="display:flex;gap:5px;align-items:center">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="11" rx="2"/><path d="M22 11V9"/></svg>
      </span>
    </div>
    <div class="hd">
      <div class="top-row">
        <div class="avs"><div class="av av-a" id="av-a">私</div><div class="av av-b" id="av-b">彼</div></div>
        <button class="period">2026年5月 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
      </div>
      <div style="font-size:11px;font-weight:400;color:var(--ink2);letter-spacing:.3px">Expenses</div>
      <div class="htitle" id="ttl">¥0</div>
      <div class="hsub"><span>私 <b id="ka">¥0</b></span><span>パートナー <b id="kb">¥0</b></span></div>
    </div>
    <div class="body">
      <div id="t-home"></div>
      <div id="t-fixed"  style="display:none;padding-bottom:8px"></div>
      <div id="t-settle" style="display:none;padding-bottom:8px"></div>
      <div id="t-memo"   style="display:none;padding-bottom:8px"></div>
    </div>
    <nav>
      <button class="tab-btn on" onclick="K.tab('home',this)">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ホーム
      </button>
      <button class="tab-btn" onclick="K.tab('fixed',this)">
        <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        固定費
      </button>
      <div class="nav-center">
        <button class="plus-btn" onclick="K.openModal()">+</button>
      </div>
      <button class="tab-btn" onclick="K.tab('settle',this)">
        <svg viewBox="0 0 24 24"><polyline points="16 3 21 8 16 13"/><line x1="3" y1="8" x2="21" y2="8"/><polyline points="8 21 3 16 8 11"/><line x1="21" y1="16" x2="3" y2="16"/></svg>
        精算
      </button>
      <button class="tab-btn" onclick="K.tab('memo',this)">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        メモ
      </button>
    </nav>
    <div id="backdrop" onclick="K.closeModal()"></div>
    <div id="modal"><div class="modal-handle"></div><div class="modal-inner"><div class="modal-title">支出を登録</div><div id="modal-body"></div></div></div>

    <!-- ── Onboarding ── -->
    <div id="onboarding">
      <div class="ob-header">
        <div style="font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.5px;margin-bottom:16px">ふたりの家計簿</div>
        <div class="ob-step"><div class="ob-dot on" id="dot0"></div><div class="ob-dot" id="dot1"></div><div class="ob-dot" id="dot2"></div></div>
      </div>
      <div class="ob-body" id="ob-body"></div>
    </div>
  </div>
</div>

<script>
/* ── Palette ── */
const COLS = ['#e2dc54','#dfefca','#add0ee','#d1c4e9','#f45c27','#6d2d59','#032f98','#266433'];
const DK   = ['#f45c27','#6d2d59','#032f98','#266433'];
const CAT_COL = {食費:'#e2dc54',住居費:'#add0ee',交通費:'#f45c27',光熱費:'#266433',娯楽:'#d1c4e9',医療:'#6d2d59',その他:'#dfefca'};
const FICON = {食費:'🍽',住居費:'🏠',交通費:'🚃',光熱費:'💡',娯楽:'🎵',医療:'💊',その他:'📦'};
const LAST_MONTH = {食費:9000,交通費:3000,娯楽:12000,医療:0,その他:2000};

const fmt  = n => '¥' + Math.round(n).toLocaleString('ja-JP');
const fmtK = n => n>=10000 ? Math.round(n/1000)+'k' : n>=1000 ? (n/1000).toFixed(1)+'k' : String(n);
const isDk = c => DK.includes(c);
const col  = i => COLS[i % COLS.length];
function getCatCol(c){ return CAT_COL[c] || (()=>{ const h=c.split('').reduce((a,x)=>a+x.charCodeAt(0),0); return COLS[h%COLS.length]; })(); }
function tc(bg){ return isDk(bg) ? '#fff' : '#1A1A1A'; }
function chipBg(bg){ return isDk(bg) ? 'rgba(255,255,255,.18)' : 'rgba(26,26,26,.1)'; }

let userCats = ['食費','住居費','交通費','光熱費','娯楽','医療','その他'];
let fx = [
  {id:'f1',name:'家賃',          amount:85000,cat:'住居費',who:'a',day:1, on:true},
  {id:'f2',name:'電気・ガス・水道',amount:12000,cat:'光熱費',who:'b',day:1, on:true},
  {id:'f3',name:'サブスク（動画）',amount:1980, cat:'娯楽',  who:'a',day:5, on:true},
  {id:'f4',name:'スマホ代',       amount:3500, cat:'その他',who:'b',day:10,on:true},
];
let ent = [
  {id:'e1',amount:3500, cat:'医療',  note:'薬局',     date:'05/03',who:'a'},
  {id:'e2',amount:8500, cat:'娯楽',  note:'映画・書籍',date:'05/04',who:'b'},
  {id:'e3',amount:7800, cat:'食費',  note:'外食',     date:'05/05',who:'a'},
  {id:'e4',amount:1500, cat:'交通費',note:'電車',     date:'05/06',who:'b'},
  {id:'e5',amount:3200, cat:'食費',  note:'スーパー', date:'05/07',who:'a'},
];
let memos = [
  {id:'m1',text:'トイレットペーパー買う',done:false,who:'b',ts:'5/6'},
  {id:'m2',text:'来月の旅行プラン決める',done:false,who:'a',ts:'5/7'},
  {id:'m3',text:'電球交換（洗面所）',    done:true, who:'b',ts:'5/5'},
];
let mT='expense', mP='a', mWho='a', selDay=null, currentTab='home';

function gfx(){ return fx.filter(f=>f.on).map(f=>({id:'x'+f.id,amount:f.amount,cat:f.cat,note:f.name,date:`05/${String(f.day).padStart(2,'0')}`,who:f.who,fixed:true})); }
function all(){ return [...gfx(), ...ent]; }
function pts(){ let a=0,b=0; all().forEach(e=>e.who==='a'?a+=e.amount:b+=e.amount); return{a,b,t:a+b}; }
function cts(){ const t={}; all().forEach(e=>t[e.cat]=(t[e.cat]||0)+e.amount); return t; }
function upd(){ const{a,b,t}=pts(); document.getElementById('ttl').textContent=fmt(t); document.getElementById('ka').textContent=fmt(a); document.getElementById('kb').textContent=fmt(b); }

/* ── Calendar ── */
function buildCalendar(){
  const daysInMonth=31, firstDay=new Date(2026,4,1).getDay(), today=7;
  const dayMap={};
  all().forEach(e=>{ const p=e.date.split('/'); if(p.length===2){const d=parseInt(p[1]); dayMap[d]=(dayMap[d]||0)+e.amount;} });
  const{t}=pts();
  const heads=['日','月','火','水','木','金','土'].map(d=>`<span>${d}</span>`).join('');
  let cells='';
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const amt=dayMap[d], dow=(firstDay+d-1)%7;
    const cls=['cal-cell',d===today?'today':'',d===selDay?'sel':'',dow===0?'sun':dow===6?'sat':''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}" onclick="K.selDay(${d})">
      <div class="cal-num">${d}</div>
      ${amt ? `<div class="cal-amt">¥${Math.round(amt).toLocaleString('ja-JP')}</div>` : `<div style="height:11px"></div>`}
    </div>`;
  }
  return `<div class="cal-wrap">
    <div class="cal-top"><span class="cal-month">2026年5月</span><span class="cal-total">${fmt(t)}</span></div>
    <div class="cal-heads">${heads}</div>
    <div class="cal-grid">${cells}</div>
  </div>`;
}

/* ── Memo cards (image-1 style) ── */
function buildMemoCards(){
  if(!memos.length) return '';
  const cards = memos.map((m,i) => {
    const bg = col(i);
    const textCol = tc(bg), chipCol = chipBg(bg);
    const isA = m.who==='a';
    const whoLabel = isA ? '私' : 'パートナー';
    const whoDot = isA ? '#e2dc54' : '#add0ee';
    const actionLabel = m.done ? '✓' : '→';
    return `<div class="memo-card${m.done?' done-card':''}" style="background:${bg}" onclick="K.togM('${m.id}')">
      <div class="mc-text${m.done?' struck':''}" style="color:${textCol}">${m.text}</div>
      <div class="mc-bottom">
        <div class="mc-chip" style="background:${chipCol};color:${textCol}">
          <span style="width:6px;height:6px;border-radius:50%;background:${isDk(bg)?'rgba(255,255,255,.6)':whoDot};display:inline-block;flex-shrink:0"></span>
          ${whoLabel} · ${m.ts}
        </div>
        <div class="mc-action" style="background:${chipCol};color:${textCol};font-weight:600">${actionLabel}</div>
      </div>
    </div>`;
  }).join('');
  return `<div class="memo-cards-section">
    <div class="section-label">共有メモ</div>
    <div class="memo-cards-scroll">${cards}</div>
  </div>`;
}

/* ── Entry card ── */
function xCard(e,i,offset=0){
  const bg=col(offset+i), dark=isDk(bg), t=tc(bg), isA=e.who==='a';
  const avBg=`rgba(${dark?'255,255,255':'26,26,26'},.18)`;
  return`<div class="xcard${dark?' dk':''}" style="background:${bg}">
    ${e.fixed?`<div class="ftag" style="color:${t}">↺ 固定費</div>`:''}
    <div class="xtop">
      <div class="xav" style="background:${avBg};color:${t}">${isA?'私':'彼'}</div>
      <div class="xday" style="color:${t}">${e.date}</div>
    </div>
    <div class="xcat" style="color:${t}">${e.cat}</div>
    <div class="xrow">
      <div class="xname" style="color:${t}">${e.note}</div>
      <div class="xamt" style="color:${t}">－${fmt(e.amount)}</div>
    </div>
  </div>`;
}

/* ── Compare ── */
function buildCompare(){
  const thisCats={}; ent.forEach(e=>thisCats[e.cat]=(thisCats[e.cat]||0)+e.amount);
  const thisTotal=Object.values(thisCats).reduce((a,b)=>a+b,0);
  const lastTotal=Object.values(LAST_MONTH).reduce((a,b)=>a+b,0);
  const delta=thisTotal-lastTotal, isUp=delta>0, isFlat=delta===0;
  const pct=lastTotal>0?Math.round(Math.abs(delta)/lastTotal*100):0;
  const deltaLabel=(isFlat?'±':isUp?'▲':'▼')+fmt(Math.abs(delta));
  const allCats=[...new Set([...Object.keys(thisCats),...Object.keys(LAST_MONTH)])];
  const maxAmt=Math.max(...allCats.map(c=>Math.max(thisCats[c]||0,LAST_MONTH[c]||0)),1);
  const rows=allCats.map(c=>{
    const cur=thisCats[c]||0, last=LAST_MONTH[c]||0, d=cur-last;
    const arrow=d>0?'↑':d<0?'↓':'→', arrowCls=d>0?'up':d<0?'dn':'flat';
    return`<div class="cat-compare-row">
      <div class="cc-name">${c}</div>
      <div class="cc-bar-wrap"><div class="cc-bar-bg"><div class="cc-bar-fill" style="width:${Math.round(cur/maxAmt*100)}%;background:${getCatCol(c)}"></div></div></div>
      <div class="cc-arrow ${arrowCls}">${arrow}</div>
      <div class="cc-val">${fmt(cur)}</div>
    </div>`;
  }).join('');
  return`<div class="compare-card">
    <h3>先月との変動費比較</h3>
    <div class="compare-hero"><div class="ch-amt">${fmt(thisTotal)}</div><div class="ch-delta ${isFlat?'flat':isUp?'up':'dn'}">${deltaLabel}（${pct}%）</div></div>
    <div class="compare-sub">先月の変動費 ${fmt(lastTotal)} との比較</div>
    ${rows}
  </div>`;
}

/* ── Renders ── */
function rHome(){
  const list=(selDay===null?all():all().filter(e=>e.date===`05/${String(selDay).padStart(2,'0')}`)).sort((a,b)=>b.date.localeCompare(a.date));
  const total=list.reduce((s,e)=>s+e.amount,0);
  const hdr=selDay?`<div class="day-header">5月${selDay}日${list.length?' — '+fmt(total):''}</div>`:`<div class="day-header">すべての記録</div>`;
  const empty=list.length?'':`<div style="text-align:center;padding:20px;color:var(--ink2);font-size:13px;background:rgba(255,255,255,.55);border-radius:16px">記録がありません</div>`;
  document.getElementById('t-home').innerHTML = buildCalendar() + buildMemoCards() + hdr + list.map((e,i)=>xCard(e,i,memos.length)).join('') + empty;
}

function rSettle(){
  const ct=cts(), {a,b,t}=pts(), mx=Math.max(...Object.values(ct),1);
  const pPct=t>0?Math.round(a/t*100):50;
  const diff=a-t/2, amt=Math.abs(diff), bOwes=diff>0, bal=amt<1;
  const cA={}, cB={};
  all().forEach(e=>{ if(e.who==='a') cA[e.cat]=(cA[e.cat]||0)+e.amount; else cB[e.cat]=(cB[e.cat]||0)+e.amount; });
  const allC=[...new Set([...Object.keys(cA),...Object.keys(cB)])];
  const catRows=Object.entries(ct).sort((x,y)=>y[1]-x[1]).map(([c,v])=>`
    <div class="crow"><div class="cdot" style="background:${getCatCol(c)}"></div><div class="cn">${c}</div>
    <div class="cbar-w"><div class="cbar" style="width:${Math.round(v/mx*100)}%;background:${getCatCol(c)}"></div></div>
    <div class="camt">${fmt(v)}</div></div>`).join('');
  document.getElementById('t-settle').innerHTML=`
    <div class="shero">
      <div class="sl">${bal?'精算不要':'今月の精算'}</div>
      <div class="sa">${bal?'均等':fmt(amt)}</div>
      <div class="sd">${bal?'ふたりの負担は均等です':(bOwes?'パートナー':'私')+'が'+(bOwes?'私':'パートナー')+'に支払う'}</div>
    </div>
    <div class="pcards">
      <div class="pcard pcard-a"><div class="pn">私</div><div class="pv">${fmt(a)}</div><div class="pp">${pPct}%を負担</div></div>
      <div class="pcard pcard-b"><div class="pn">パートナー</div><div class="pv">${fmt(b)}</div><div class="pp">${100-pPct}%を負担</div></div>
    </div>
    ${buildCompare()}
    <div class="ccard"><h3>カテゴリ別支出</h3>${catRows}</div>
    <div class="ccard"><h3>誰が払ったか</h3>
      ${allC.map(c=>`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:13px;font-weight:500;display:flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:50%;background:${getCatCol(c)};display:inline-block"></span>${c}</span>
          <span style="font-size:11px;color:var(--ink2)">${fmt((cA[c]||0)+(cB[c]||0))}</span>
        </div>
        <div style="display:flex;gap:12px;font-size:11px;font-weight:500">
          <span style="color:var(--forest)">私: ${cA[c]?fmt(cA[c]):'－'}</span>
          <span style="color:var(--blue)">パートナー: ${cB[c]?fmt(cB[c]):'－'}</span>
        </div>
      </div>`).join('')}
    </div>`;
}

function rMemo(){
  const todo=memos.filter(m=>!m.done), done=memos.filter(m=>m.done);
  const chkSvg=`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
  const xSvg=`<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  const mk=m=>`<div class="memo-list-item${m.done?' done':''}">
    <button class="memo-cb${m.done?' ch':''}" onclick="K.togM('${m.id}')">${m.done?chkSvg:''}</button>
    <div class="memo-body">
      <div class="mt">${m.text}</div>
      <div class="mm"><span style="width:7px;height:7px;border-radius:50%;background:${m.who==='a'?'var(--lime)':'var(--sky)'};display:inline-block"></span>${m.who==='a'?'私':'パートナー'} · ${m.ts}</div>
    </div>
    <button class="memo-del" onclick="K.delM('${m.id}')">${xSvg}</button>
  </div>`;
  const sendSvg=`<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
  document.getElementById('t-memo').innerHTML=`
    <div class="memo-add">
      <textarea id="mi" placeholder="メモを入力… Enterで送信" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();K.addM()}"></textarea>
      <button class="send-btn" onclick="K.addM()">${sendSvg}</button>
    </div>
    <div class="memo-who-row">
      <button class="${mWho==='a'?'pa':'off'}" onclick="K.mw('a')">私から</button>
      <button class="${mWho==='b'?'pb':'off'}" onclick="K.mw('b')">パートナーから</button>
    </div>
    ${todo.length?`<div class="msect">やること（${todo.length}）</div>${todo.map(mk).join('')}`:''}
    ${done.length?`<div class="msect">完了（${done.length}）</div>${done.map(mk).join('')}`:''}
    ${!memos.length?'<div style="text-align:center;padding:40px;color:var(--ink2);font-size:13px">メモがありません</div>':''}`;
}

function rFixed(){
  const ft=fx.filter(f=>f.on).reduce((s,f)=>s+f.amount,0);
  const opts=userCats.map(c=>`<option>${c}</option>`).join('');
  const dOpts=Array.from({length:28},(_,i)=>`<option value="${i+1}">${i+1}日</option>`).join('');
  const items=fx.map((f,i)=>{
    const bg=col(i), dark=isDk(bg), t=tc(bg), isA=f.who==='a';
    const dbg=`rgba(${dark?'255,255,255':'26,26,26'},.15)`;
    return`<div class="fxcard${f.on?'':' off'}" style="background:${bg}">
      <div class="fxicon" style="color:${t}">${FICON[f.cat]||'📦'}</div>
      <div class="fxmeta"><div class="fn" style="color:${t}">${f.name}</div><div class="fd" style="color:${t}">毎月${f.day}日 · ${isA?'私':'パートナー'} · ${f.cat}</div></div>
      <div class="fxright"><div class="fxamt" style="color:${t}">${fmt(f.amount)}</div>
        <div class="fxact">
          <button class="dbtn" onclick="K.delF('${f.id}')" style="background:${dbg};color:${t}">削除</button>
          <button class="tsw ${f.on?'on':'off'}" onclick="K.togF('${f.id}')"></button>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('t-fixed').innerHTML=`
    <div class="istrip">↺ 固定費は毎月自動で計上されます。<b style="color:var(--ink);font-weight:600;margin-left:4px">今月: ${fmt(ft)}</b></div>
    ${items}
    <div class="fbox">
      <div class="ftitle">固定費を追加</div>
      <div class="irow"><label>名前</label><input type="text" id="fn" placeholder="例：家賃、スマホ代"></div>
      <div class="g2">
        <div class="irow"><label>金額（円）</label><input type="number" id="fa" placeholder="0"></div>
        <div class="irow"><label>引落日</label><select id="fd">${dOpts}</select></div>
      </div>
      <div class="g2">
        <div class="irow"><label>カテゴリ</label><select id="fc">${opts}</select></div>
        <div class="irow"><label>支払う人</label><select id="fp"><option value="a">私</option><option value="b">パートナー</option></select></div>
      </div>
      <button class="abtn" onclick="K.addF()">↺ 登録する</button>
    </div>`;
}

function rModal(){
  const opts=userCats.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('modal-body').innerHTML=`
    <div class="ttog">
      <button class="${mT==='expense'?'se':''}" onclick="K.mt('expense')">支出</button>
      <button class="${mT==='income'?'si':''}" onclick="K.mt('income')">収入</button>
    </div>
    <div class="ptog">
      <button class="${mP==='a'?'pa':''}" onclick="K.mp('a')">私</button>
      <button class="${mP==='b'?'pb':''}" onclick="K.mp('b')">パートナー</button>
    </div>
    <div class="irow"><label>金額（円）</label><input type="number" id="ma" placeholder="0" style="font-size:22px;font-weight:500;letter-spacing:-1px"></div>
    <div class="g2">
      <div class="irow"><label>日付</label><input type="date" id="md" value="2026-05-07"></div>
      <div class="irow"><label>カテゴリ</label><select id="mc">${opts}</select></div>
    </div>
    <div class="irow"><label>メモ</label><input type="text" id="mn" placeholder="内容を入力"></div>
    <div class="irow">
      <label>カテゴリを追加</label>
      <div class="cat-add-row"><input type="text" id="nc" placeholder="新しいカテゴリ名"><button onclick="K.addCat()">追加</button></div>
    </div>
    <button class="abtn" onclick="K.addEnt()">+ 登録する</button>`;
}

/* ── Controller ── */
const K = {
  tab(n,btn){
    ['home','fixed','settle','memo'].forEach(t=>document.getElementById('t-'+t).style.display=t===n?'':'none');
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on'); currentTab=n;
    if(n==='home')rHome(); else if(n==='fixed')rFixed(); else if(n==='settle')rSettle(); else rMemo();
  },
  selDay(d){ selDay=selDay===d?null:d; rHome(); },
  openModal(){ rModal(); document.getElementById('modal').classList.add('open'); document.getElementById('backdrop').classList.add('open'); setTimeout(()=>{ const el=document.getElementById('ma'); if(el)el.focus(); },320); },
  closeModal(){ document.getElementById('modal').classList.remove('open'); document.getElementById('backdrop').classList.remove('open'); },
  mt(t){ mT=t; rModal(); },
  mp(p){ mP=p; rModal(); },
  addCat(){ const el=document.getElementById('nc'), name=el.value.trim(); if(!name||userCats.includes(name))return; userCats.push(name); el.value=''; rModal(); },
  addEnt(){
    const amt=parseInt(document.getElementById('ma').value||0);
    if(!amt||amt<=0)return;
    const cat=document.getElementById('mc').value, note=document.getElementById('mn').value||cat;
    const raw=document.getElementById('md').value, p=raw.split('-');
    const date=p.length===3 ? `${p[1]}/${p[2]}` : (()=>{ const n=new Date(); return `${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')}`; })();
    ent.push({id:'e'+Date.now(),amount:amt,cat,note,date,who:mP});
    upd(); K.closeModal();
    if(currentTab==='home')rHome(); else if(currentTab==='settle')rSettle();
  },
  addF(){
    const name=document.getElementById('fn').value.trim(), amt=parseInt(document.getElementById('fa').value||0);
    if(!name||!amt||amt<=0)return;
    fx.push({id:'f'+Date.now(),name,amount:amt,cat:document.getElementById('fc').value,who:document.getElementById('fp').value,day:parseInt(document.getElementById('fd').value),on:true});
    upd(); rFixed();
  },
  togF(id){ const f=fx.find(f=>f.id===id); if(f)f.on=!f.on; upd(); rFixed(); },
  delF(id){ fx=fx.filter(f=>f.id!==id); upd(); rFixed(); },
  mw(w){ mWho=w; rMemo(); },
  addM(){
    const el=document.getElementById('mi'), text=el.value.trim();
    if(!text)return;
    const n=new Date();
    memos.unshift({id:'m'+Date.now(),text,done:false,who:mWho,ts:`${n.getMonth()+1}/${n.getDate()}`});
    el.value=''; rMemo();
    if(currentTab==='home')rHome();
  },
  togM(id){ const m=memos.find(m=>m.id===id); if(m)m.done=!m.done; rMemo(); if(currentTab==='home')rHome(); },
  delM(id){ memos=memos.filter(m=>m.id!==id); rMemo(); }
};

upd(); rHome();

/* ── Onboarding ── */
let obStep=0, obInviteTab='invite', myName='', partnerName='';
const INVITE_CODE = '2648-57'; // mock code

function obSetStep(n){
  obStep=n;
  [0,1,2].forEach(i=>{
    const d=document.getElementById('dot'+i);
    if(d){ d.className='ob-dot'+(i<=n?' on':''); d.style.width=i===n?'20px':'6px'; }
  });
  const body=document.getElementById('ob-body');
  if(n===0) body.innerHTML=obStep0();
  else if(n===1) body.innerHTML=obStep1();
  else body.innerHTML=obStep2();
}

function obStep0(){ return`
  <div class="ob-title">あなたの名前を<br>教えてください</div>
  <div class="ob-sub">パートナーとの家計を一緒に管理しましょう。まずあなたの名前を入力してください。</div>
  <input class="ob-input" id="ob-name" placeholder="例：田中 花子" value="${myName}" maxlength="10">
  <div style="margin-bottom:20px">
    <div style="font-size:11px;font-weight:500;color:var(--ink2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">アイコンカラー</div>
    <div style="display:flex;gap:8px">
      ${['#e2dc54','#dfefca','#add0ee','#d1c4e9','#f45c27','#266433'].map((c,i)=>`
        <div onclick="OB.setMyColor('${c}')" style="width:32px;height:32px;border-radius:50%;background:${c};cursor:pointer;border:2.5px solid ${myColor===c?'var(--ink)':'transparent'};transition:border .15s"></div>
      `).join('')}
    </div>
  </div>
  <button class="ob-btn" onclick="OB.next0()">次へ →</button>
`;}

function obStep1(){ return`
  <div class="ob-title">パートナーを<br>招待しましょう</div>
  <div class="ob-sub">招待コードをパートナーに送ると、同じ家計簿を共有できます。</div>
  <div class="ob-tab-row">
    <button class="ob-tab ${obInviteTab==='invite'?'on':''}" onclick="OB.invTab('invite')">招待する</button>
    <button class="ob-tab ${obInviteTab==='join'?'on':''}" onclick="OB.invTab('join')">コードで参加</button>
  </div>
  ${obInviteTab==='invite' ? `
    <div class="ob-card" style="background:var(--lime)">
      <div style="font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px">招待コード</div>
      <div class="ob-code">${INVITE_CODE}</div>
      <div style="font-size:12px;font-weight:400;color:var(--ink2);text-align:center">このコードをパートナーに送ってください</div>
    </div>
    <button class="ob-share-btn" onclick="OB.share()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      LINEやメッセージで送る
    </button>
    <button class="ob-btn" onclick="OB.next1()">パートナーが参加したら次へ</button>
    <button class="ob-btn-sub" onclick="OB.next1()">あとで招待する</button>
  ` : `
    <div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:600;color:var(--ink2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">招待コードを入力</div>
      <input class="ob-input" id="ob-code" placeholder="XXXX-XX" maxlength="7" style="font-size:20px;font-weight:600;letter-spacing:4px;text-align:center">
    </div>
    <button class="ob-btn" onclick="OB.joinCode()">参加する</button>
    <button class="ob-btn-sub" onclick="OB.invTab('invite')">← 招待コードを送る</button>
  `}
`;}

function obStep2(){ return`
  <div class="ob-title">準備完了！</div>
  <div class="ob-sub">ふたりの家計簿がはじまります。いつでも設定から変更できます。</div>
  <div class="ob-avatar-row" style="margin-bottom:10px">
    <div class="ob-avatar" style="background:${myColor};color:${isDk(myColor)?'#fff':'#1A1A1A'}">${myName?myName[0]:'私'}</div>
    <div>
      <div style="font-size:14px;font-weight:600;color:var(--ink)">${myName||'あなた'}</div>
      <div style="font-size:11px;color:var(--ink2)">自分のアカウント</div>
    </div>
  </div>
  <div class="ob-avatar-row">
    <div class="ob-avatar" style="background:var(--sky);color:var(--ink)">彼</div>
    <div>
      <div style="font-size:14px;font-weight:600;color:var(--ink)">パートナー</div>
      <div style="font-size:11px;color:var(--ink2)">招待コード: ${INVITE_CODE}</div>
    </div>
  </div>
  <div style="margin:20px 0;padding:14px;background:rgba(26,26,26,.05);border-radius:14px;font-size:12px;color:var(--ink2);line-height:1.6">
    <b style="color:var(--ink)">パートナーの参加方法</b><br>
    パートナーがアプリをインストールして招待コード <b style="color:var(--ink);letter-spacing:2px">${INVITE_CODE}</b> を入力すると、リアルタイムでデータが共有されます。
  </div>
  <button class="ob-btn" onclick="OB.finish()" style="background:var(--forest)">はじめる</button>
`;}

let myColor='#e2dc54';

const OB = {
  setMyColor(c){ myColor=c; obSetStep(0); },
  next0(){
    const n=document.getElementById('ob-name');
    myName=(n?n.value.trim():'')||'あなた';
    obSetStep(1);
  },
  invTab(t){ obInviteTab=t; obSetStep(1); },
  share(){ alert('実際のアプリではLINE・メッセージ・メールでコードを送れます。'); },
  joinCode(){
    const c=document.getElementById('ob-code');
    if(c&&c.value.replace('-','').length>=4) obSetStep(2);
    else { c&&(c.style.background='rgba(244,92,39,.15)'); }
  },
  next1(){ obSetStep(2); },
  finish(){
    // Apply user settings
    const initial=myName[0]||'私';
    document.getElementById('av-a').textContent=initial;
    document.getElementById('av-a').style.background=myColor;
    document.getElementById('av-a').style.color=isDk(myColor)?'#fff':'#1A1A1A';
    document.getElementById('av-b').textContent='彼';
    document.getElementById('ob-name-display')&&(document.getElementById('ob-name-display').textContent=myName);
    // Hide onboarding
    const ob=document.getElementById('onboarding');
    ob.style.transition='opacity .4s';
    ob.style.opacity='0';
    setTimeout(()=>ob.style.display='none',400);
    // Update names in data
    names={a:myName,b:'パートナー'};
    upd(); rHome();
  }
};

// Show onboarding on first load
obSetStep(0);

/* ── Service Worker ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js');
  });
}
</script>
</body>
</html>
